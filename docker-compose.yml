services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack-contact-center
    ports:
      - "4566:4566"
    environment:
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=localstack
      - AWS_SECRET_ACCESS_KEY=localstack
      - SERVICES=dynamodb,lambda,apigateway,iam,logs,sqs,sns,events,ses,cloudwatch,sts,s3,cloudformation,cloudwatch,cognito-idp
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh"
    networks:
      - contact-center-network

  frontend:
    build:
      context: ./frontend
    container_name: contact-center-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - contact-center-network

networks:
  contact-center-network:
    driver: bridge