AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Custom Contact Center - Serverless Backend

Parameters:
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID
  CognitoClientId:
    Type: String
    Description: Cognito App Client ID

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: ContactCenter
        AWS_ENDPOINT: http://host.docker.internal:4566
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId

Resources:

  PingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: PingFunction
      CodeUri: ../backend
      Handler: dist/handlers/ping.handler
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /ping
            Method: get

Outputs:
  ApiEndpoint:
    Description: LocalStack API Gateway endpoint
    Value: http://localhost:4566