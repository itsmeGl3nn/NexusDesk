AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Custom Contact Center - Serverless Backend (Local)

Parameters:
  CognitoUserPoolId:
    Type: String
    Description: Cognito User Pool ID (use a placeholder for local dev)
    Default: local-user-pool-id
  CognitoClientId:
    Type: String
    Description: Cognito App Client ID (use a placeholder for local dev)
    Default: local-client-id

Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    MemorySize: 128
    Environment:
      Variables:
        TABLE_NAME: ContactCenter
        AWS_ENDPOINT: http://host.docker.internal:4566
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_CLIENT_ID: !Ref CognitoClientId

Resources:

  PingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: PingFunction
      CodeUri: ../backend
      Handler: dist/handlers/ping.handler
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /ping
            Method: get

  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: CreateUserFunction
      CodeUri: ../backend
      Handler: dist/handlers/user.handler.createUser
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users
            Method: post

  ListUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ListUsersFunction
      CodeUri: ../backend
      Handler: dist/handlers/user.handler.listUsers
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users
            Method: get

  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetUserFunction
      CodeUri: ../backend
      Handler: dist/handlers/user.handler.getUser
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: get

  UpdateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: UpdateUserFunction
      CodeUri: ../backend
      Handler: dist/handlers/user.handler.updateUser
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /users/{userId}
            Method: patch

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: GetMeFunction
      CodeUri: ../backend
      Handler: dist/handlers/user.handler.getMe
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /me
            Method: get

  # ============================================================
  # Auth Lambda Functions (public)
  # ============================================================
  LoginFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: LoginFunction
      CodeUri: ../backend
      Handler: dist/handlers/auth.handler.login
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/login
            Method: post

  SignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SignupFunction
      CodeUri: ../backend
      Handler: dist/handlers/auth.handler.signup
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/signup
            Method: post

  ConfirmSignupFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: ConfirmSignupFunction
      CodeUri: ../backend
      Handler: dist/handlers/auth.handler.confirmSignup
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/confirm
            Method: post

  RefreshTokenFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: RefreshTokenFunction
      CodeUri: ../backend
      Handler: dist/handlers/auth.handler.refresh
      Architectures:
        - x86_64
      Events:
        Api:
          Type: Api
          Properties:
            Path: /auth/refresh
            Method: post

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "http://localhost:3000"